# N字战法学习与A股推送系统 — 主配置文件
#
# 策略版本: v2 (2026-05-16)
# 新增: MA9/MA10均线+费波位共振确认

# --- 飞书配置 ---
feishu:
  # 从 .env 文件加载凭证，这里只放非敏感配置
  event_verification_token: ""   # 飞书事件订阅 Verification Token
  event_encrypt_key: ""          # 飞书事件订阅 Encrypt Key（如未开启加密可不填）

# --- N字战法参数（大神策略 v1 · 2026-05-16 更新）---
#
# 策略来源: 大神群聊解盘
# 核心逻辑:
#   1. 第一波放量拉升后，等回调到 0.5 费波位附近
#   2. 放量下杀 → 缩量企稳 → 长下影确认 → 买入
#   3. 止损放在 0.5 费波位下方
#
# 案例: 宝光股份(600379) 2026-05-16
#   14.08→20.80(+47.7%) → 回调至17.54(0.5费波位17.44) → 长下影收18.66
#   17.80附近企稳即为买点，止损17.44下方
#
n_pattern:
  # 形态参数
  min_rise_1st: 0.05            # 第一波最小涨幅 (5%)
  max_rise_1st: 0.70            # 第一波最大涨幅 (70%，覆盖涨停驱动的大N)
  retrace_min: 0.25             # 回调最小深度（覆盖0.236费波位，强趋势浅调）
  retrace_max: 0.65             # 回调最大深度（覆盖 0.618 费波位）
  retrace_days_min: 1           # 回调最少交易日（含1日急跌）
  retrace_days_max: 15          # 回调最多交易日
  vol_ratio_breakout: 1.5       # 突破日量比阈值

  # 企稳确认（大神核心策略）
  require_stabilization: true           # 是否需要企稳确认
  stabilization_vol_shrink: 0.7         # 企稳日量 < 放量下杀日量 × 0.7 (缩量企稳)
  require_lower_shadow: true            # 是否需要长下影确认
  lower_shadow_ratio: 0.03              # 下影线长度 ≥ 收盘价 × 3%

  # 均线确认（大神策略 v2 · 2026-05-16 新增）
  # 费波位 + MA9/MA10 共振时信号更强
  require_ma_confluence: false       # 是否要求费波位与均线共振（true=仅出共振信号）
  ma_periods: [9, 10]               # 均线周期
  ma_fib_confluence_pct: 0.01       # 费波位与均线差值 < 1% 视为共振

  # 交易参数
  stop_loss_mode: "fib050"      # 止损模式: 0.5 费波位下方
  stop_loss_pct: 0.02           # 止损百分比 (2%, 紧贴0.5费波位)
  take_profit_mode: "equal"     # 止盈方式: equal(等幅测距) / trailing / fixed
  take_profit_pct: 0.10         # 固定止盈比例

  # 辅助条件
  max_mcap_yi: 500              # 最大市值(亿)
  min_mcap_yi: 20               # 最小市值(亿)
  min_turnover_wan: 5000        # 最小日成交额(万)
  enable_trading_factors: true  # 启用交易行为因子评分
  high_win_mode: true           # 高胜率模式：收盘强 + 波动缩 + 压力空间过滤
  high_win_min_strength: 85
  high_win_min_close_position_score: 0
  high_win_min_volatility_contraction_score: 5
  high_win_min_sequence_confidence: 0.48
  high_win_min_factor_score: 0
  high_win_min_resistance_pct: 3.0
  high_win_min_rr: 1.5
  high_win_min_ml_confidence: 0.45

# --- 扫描配置 ---
screener:
  top_n: 3                      # 兼容旧配置，等价于 watchlist_top_n
  execution_top_n: 3            # 执行层：严格高胜率候选上限
  watchlist_top_n: 3            # 观察层：每天给你筛选的候选数
  watchlist_min_ml_confidence: 0.45
  watchlist_min_sequence_confidence: 0.47
  watchlist_min_rr: 1.2
  watchlist_min_strength: 80
  watchlist_min_factor_score: 0
  watchlist_min_close_position_score: -10
  watchlist_min_volatility_contraction_score: 5
  allow_relaxed_fallback: true
  markets: ["sh", "sz"]          # 扫描市场：仅主板（60xxxx上海主板 + 000xxx/001xxx深圳主板）
  exclude_st: true              # 排除 ST
  exclude_suspend: true         # 排除停牌
  main_board_only: true         # 仅主板（60xxxx + 000xxx/001xxx），排除创业板/科创板/北交所
  industry_filter: []           # 限定行业（空=全市场），如 ["半导体","机器人"]
  enable_tradingagents: false   # 默认关闭，避免日扫描被多智能体长耗时分析拖住

# --- 回测配置 ---
backtest:
  commission_pct: 0.00025       # 佣金 万2.5
  stamp_tax_pct: 0.001          # 印花税 千1（仅卖出）
  slippage_pct: 0.001           # 滑点 0.1%
  init_cash: 1000000            # 初始资金（元）
  max_position_pct: 0.2         # 单票最大仓位 20%
  max_positions: 3              # 最大同时持仓数
  lookback_years: 1             # 回测基准年数：默认按最近1年全市场K线做统一评估

# --- 优化器配置 ---
optimizer:
  method: "bayesian"            # bayesian / grid / random
  n_iterations: 200             # 迭代次数
  cv_folds: 3                   # 交叉验证折数
  target_metric: "sharpe"       # 优化目标: sharpe / win_rate / profit_factor / calmar

# --- 训练配置 ---
training:
  retrain_interval_days: 30     # 每 N 天重新训练一次
  min_samples: 50               # 最少消息样本数才开始提取规则
